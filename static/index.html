<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GestureVoice</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #f5f2ee;
  --surface: #ffffff;
  --surface2: #ede9e3;
  --border: #d8d3cb;
  --text: #1a1714;
  --muted: #8c8680;
  --accent: #2d6a4f;
  --accent-light: #d8f3dc;
  --accent2: #e07a5f;
  --accent2-light: #fde8e2;
  --warn: #c0392b;
  --blue: #3d6fa8;
  --blue-light: #dce8f5;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.5;
}

/* ── WIZARD OVERLAY ─────────────────────────────────────────────────── */
#wizard {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 100;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  transition: opacity 0.4s, pointer-events 0.4s;
}
#wizard.hidden { opacity: 0; pointer-events: none; }

.wizard-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 620px;
  overflow: hidden;
}

.wizard-header {
  background: var(--accent);
  padding: 32px 40px 28px;
  color: white;
}
.wizard-logo {
  font-size: 13px; font-weight: 500; letter-spacing: 0.12em;
  text-transform: uppercase; opacity: 0.7; margin-bottom: 12px;
}
.wizard-title {
  font-size: 28px; font-weight: 700; line-height: 1.2; margin-bottom: 8px;
}
.wizard-sub {
  font-size: 15px; opacity: 0.8; font-weight: 400;
}
.wizard-steps {
  display: flex; gap: 6px; margin-top: 20px;
}
.wizard-step-dot {
  height: 4px; border-radius: 2px;
  background: rgba(255,255,255,0.3);
  transition: all 0.3s; flex: 1;
}
.wizard-step-dot.active { background: white; }
.wizard-step-dot.done { background: rgba(255,255,255,0.6); }

.wizard-body {
  padding: 36px 40px 32px;
}

.wizard-section-title {
  font-size: 12px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
}

/* Body part cards */
.bodypart-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 12px; margin-bottom: 8px;
}
.bodypart-card {
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 20px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  user-select: none;
}
.bodypart-card:hover { border-color: var(--accent); background: var(--accent-light); }
.bodypart-card.selected {
  border-color: var(--accent);
  background: var(--accent-light);
  box-shadow: 0 0 0 3px rgba(45,106,79,0.15);
}
.bodypart-icon { font-size: 32px; margin-bottom: 8px; }
.bodypart-label { font-size: 13px; font-weight: 600; color: var(--text); }
.bodypart-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border);
  margin: 8px auto 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; font-size: 11px; color: transparent;
}
.bodypart-card.selected .bodypart-check {
  background: var(--accent); border-color: var(--accent); color: white;
}
.bodypart-note {
  font-size: 12px; color: var(--muted); text-align: center; margin-top: 8px;
}

/* Gesture selection */
.gesture-options { display: flex; flex-direction: column; gap: 10px; }
.gesture-option {
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  cursor: pointer;
  display: flex; align-items: center; gap: 14px;
  transition: all 0.2s; background: var(--surface);
}
.gesture-option:hover { border-color: var(--accent); background: var(--accent-light); }
.gesture-option.selected { border-color: var(--accent); background: var(--accent-light); }
.gesture-option-icon { font-size: 22px; flex-shrink: 0; }
.gesture-option-text { flex: 1; }
.gesture-option-name { font-size: 14px; font-weight: 600; }
.gesture-option-desc { font-size: 12px; color: var(--muted); margin-top: 1px; }
.gesture-option-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: transparent; transition: all 0.2s;
}
.gesture-option.selected .gesture-option-check {
  background: var(--accent); border-color: var(--accent); color: white;
}

/* Recording step */
.rec-gesture-name {
  font-size: 22px; font-weight: 700; margin-bottom: 4px;
}
.rec-gesture-phrase {
  display: inline-block;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 14px; font-weight: 600;
  padding: 4px 12px; border-radius: 100px;
  margin-bottom: 16px;
}
.rec-instructions {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  font-size: 14px; color: var(--muted);
  margin-bottom: 20px;
  border-left: 3px solid var(--accent);
}
.rec-instructions strong { color: var(--text); }

.rec-progress-area { margin-bottom: 24px; }
.rec-session-label {
  font-size: 12px; font-weight: 600; color: var(--muted);
  letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px; display: flex; justify-content: space-between;
}
.rec-dots { display: flex; gap: 6px; margin-bottom: 12px; }
.rec-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--border); transition: all 0.3s;
}
.rec-dot.done { background: var(--accent); }
.rec-dot.active { background: var(--accent2); transform: scale(1.3); }

.rec-bar-wrap {
  background: var(--surface2); border-radius: 100px;
  height: 10px; overflow: hidden;
}
.rec-bar {
  height: 100%; background: var(--accent2); border-radius: 100px;
  width: 0%; transition: width 0.15s;
}
.rec-bar.done { background: var(--accent); }
.rec-count {
  font-family: var(--mono); font-size: 12px; color: var(--muted);
  text-align: right; margin-top: 4px;
}

/* Neutral step */
.neutral-diagram {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
}
.neutral-diagram-icon { font-size: 48px; margin-bottom: 8px; }
.neutral-diagram-text { font-size: 14px; color: var(--muted); }

/* Summary */
.summary-list { display: flex; flex-direction: column; gap: 10px; }
.summary-item {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px 14px;
}
.summary-item-icon { font-size: 20px; flex-shrink: 0; }
.summary-item-text { font: 14px/1.3 var(--font); }
.summary-item-name { font-weight: 600; }
.summary-item-phrase { color: var(--muted); font-size: 13px; }
.summary-check { color: var(--accent); margin-left: auto; font-size: 16px; }

/* Wizard nav */
.wizard-nav {
  display: flex; gap: 10px; margin-top: 28px; align-items: center;
}
.wizard-nav .spacer { flex: 1; }
.btn-wizard-back {
  padding: 10px 20px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-wizard-back:hover { border-color: var(--text); color: var(--text); }
.btn-wizard-next {
  padding: 12px 28px; border-radius: var(--radius-sm);
  border: none; background: var(--accent);
  color: white; font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px;
}
.btn-wizard-next:hover { background: #245a41; }
.btn-wizard-next:disabled { opacity: 0.4; pointer-events: none; }
.btn-wizard-rec {
  padding: 14px 28px; border-radius: var(--radius-sm);
  border: none; background: var(--accent2);
  color: white; font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 8px;
}
.btn-wizard-rec:hover { background: #c4694f; }
.btn-wizard-rec.recording { background: var(--warn); }
.btn-wizard-rec:disabled { opacity: 0.4; pointer-events: none; }

/* ── MAIN APP ────────────────────────────────────────────────────────── */
#app {
  display: none;
  min-height: 100vh;
  flex-direction: column;
}
#app.visible { display: flex; }

.app-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 28px;
  display: flex; align-items: center; gap: 20px;
}
.app-logo { font-size: 18px; font-weight: 700; }
.app-logo span { color: var(--accent); }
.app-header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }

.ws-badge {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--mono); font-size: 12px; color: var(--muted);
}
.ws-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--warn); transition: background 0.3s;
}
.ws-dot.connected { background: var(--accent); box-shadow: 0 0 8px rgba(45,106,79,0.5); }

.btn-sm {
  padding: 7px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }

.app-main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 380px;
  height: calc(100vh - 57px);
  overflow: hidden;
}

/* Canvas area */
.canvas-pane {
  position: relative;
  background: #1a1714;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
video { display: none; }
#overlay { width: 100%; height: 100%; object-fit: cover; }

.mode-badge {
  position: absolute; top: 16px; left: 16px;
  padding: 6px 14px; border-radius: 100px;
  font-family: var(--mono); font-size: 12px; font-weight: 500;
  letter-spacing: 0.05em;
  background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.5); transition: all 0.2s;
}
.mode-badge.recording { color: #f5a25a; border-color: rgba(245,162,90,0.4); }
.mode-badge.inference { color: #6fd4a0; border-color: rgba(111,212,160,0.4); }

.trigger-flash {
  position: absolute; inset: 0;
  background: var(--accent);
  opacity: 0; pointer-events: none;
  transition: opacity 0.05s;
}
.trigger-flash.fire { opacity: 0.12; }

.triggered-label {
  position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 100px;
  padding: 10px 24px;
  font-size: 16px; font-weight: 600; color: white;
  opacity: 0; transition: opacity 0.2s;
  white-space: nowrap;
}
.triggered-label.show { opacity: 1; }

/* Confidence bar */
.conf-wrap {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; background: rgba(0,0,0,0.3);
}
.conf-bar {
  height: 100%; background: var(--accent);
  width: 0%; transition: width 0.1s;
}

/* Sidebar */
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sidebar-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.sidebar-tab {
  flex: 1; padding: 12px 8px;
  text-align: center; font-size: 12px; font-weight: 600;
  color: var(--muted); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s; letter-spacing: 0.05em;
  text-transform: uppercase;
}
.sidebar-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.sidebar-panel {
  display: none; flex: 1; overflow-y: auto; padding: 20px;
}
.sidebar-panel.active { display: block; }
.sidebar-panel::-webkit-scrollbar { width: 4px; }
.sidebar-panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Gesture tiles in sidebar */
.gesture-tiles { display: flex; flex-direction: column; gap: 10px; }
.gesture-tile {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px;
  display: flex; align-items: center; gap: 12px;
  transition: all 0.2s;
}
.gesture-tile.active-pred {
  border-color: var(--accent);
  background: var(--accent-light);
}
.gesture-tile-icon { font-size: 22px; flex-shrink: 0; }
.gesture-tile-body { flex: 1; min-width: 0; }
.gesture-tile-name { font-size: 14px; font-weight: 600; }
.gesture-tile-phrase {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.gesture-tile-status {
  font-family: var(--mono); font-size: 11px;
  color: var(--muted); flex-shrink: 0;
}
.gesture-tile.active-pred .gesture-tile-status { color: var(--accent); font-weight: 600; }

.section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px; margin-top: 4px;
}

/* Add gesture form */
.add-gesture-form {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px; margin-top: 10px;
}
.add-gesture-form input[type="text"] {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; color: var(--text);
  font-family: var(--font); font-size: 14px;
  padding: 9px 12px; outline: none; transition: border-color 0.15s;
  margin-bottom: 10px;
}
.add-gesture-form input:focus { border-color: var(--accent); }
.add-gesture-form input::placeholder { color: var(--muted); }

/* Recording UI in sidebar */
.rec-card {
  background: var(--surface2); border: 2px solid var(--border);
  border-radius: var(--radius-sm); padding: 16px;
  margin-top: 10px; transition: border-color 0.2s;
}
.rec-card.active { border-color: var(--accent2); }
.rec-card-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 10px; letter-spacing: 0.05em; text-transform: uppercase; }
.rec-progress { display: flex; flex-direction: column; gap: 6px; }
.rec-session-row { display: flex; align-items: center; gap: 8px; }
.rec-session-num { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 14px; }
.rec-session-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.rec-session-fill { height: 100%; width: 0%; border-radius: 3px; background: var(--accent2); transition: width 0.15s; }
.rec-session-fill.done { background: var(--accent); }
.rec-session-btn {
  padding: 4px 10px; border-radius: 4px;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--muted); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.rec-session-btn:hover { border-color: var(--accent); color: var(--accent); }
.rec-session-btn.recording { border-color: var(--accent2); color: var(--accent2); background: var(--accent2-light); }
.rec-session-btn.done { border-color: var(--accent); color: var(--accent); }

/* Action buttons */
.btn-primary {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  border: none; background: var(--accent); color: white;
  font-family: var(--font); font-size: 15px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; margin-top: 12px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover { background: #245a41; }
.btn-primary:disabled { opacity: 0.4; pointer-events: none; }
.btn-secondary {
  width: 100%; padding: 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: transparent;
  color: var(--text); font-family: var(--font); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.15s; margin-top: 8px;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger {
  width: 100%; padding: 10px; border-radius: var(--radius-sm);
  border: 1px solid transparent; background: transparent;
  color: var(--muted); font-family: var(--font); font-size: 13px;
  cursor: pointer; transition: all 0.15s; margin-top: 4px;
}
.btn-danger:hover { color: var(--warn); border-color: var(--warn); }

/* Log */
#log {
  font-family: var(--mono); font-size: 12px; color: var(--muted);
  display: flex; flex-direction: column; gap: 3px;
}
.log-entry { padding: 2px 0; border-bottom: 1px solid var(--border); }
.log-entry.ok { color: var(--accent); }
.log-entry.warn { color: var(--warn); }
.log-entry.trigger { color: var(--text); font-weight: 600; }

/* Inference panel */
.inference-card {
  background: var(--accent-light);
  border: 1px solid rgba(45,106,79,0.2);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin-bottom: 16px;
  text-align: center;
}
.inference-label {
  font-size: 13px; color: var(--accent); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px;
}
.inference-pred {
  font-size: 20px; font-weight: 700; color: var(--text);
  min-height: 30px;
}
.queue-dots { display: flex; gap: 4px; justify-content: center; margin-top: 8px; }
.q-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); transition: background 0.15s;
}
.q-dot.lit { background: var(--accent); }
.q-dot.neutral { background: var(--muted); opacity: 0.5; }

/* Smooth badge */
.smooth-info {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 10px 14px; font-size: 13px; color: var(--muted);
  margin-bottom: 12px;
}
</style>
</head>
<body>

<!-- ══════════════════ WIZARD ══════════════════ -->
<div id="wizard">
  <div class="wizard-card">
    <div class="wizard-header">
      <div class="wizard-logo">GestureVoice Setup</div>
      <div class="wizard-title" id="wizardTitle">Welcome</div>
      <div class="wizard-sub" id="wizardSub">Let's set up your voice in a few steps</div>
      <div class="wizard-steps" id="wizardSteps"></div>
    </div>
    <div class="wizard-body" id="wizardBody"></div>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="app">
  <header class="app-header">
    <div class="app-logo">Gesture<span>Voice</span></div>
    <div class="app-header-right">
      <div class="ws-badge">
        <div class="ws-dot" id="wsDot"></div>
        <span id="wsLabel">CONNECTING</span>
      </div>
      <button class="btn-sm" id="btnSetupAgain">⟳ Setup</button>
    </div>
  </header>

  <div class="app-main">
    <div class="canvas-pane">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
      <div class="trigger-flash" id="triggerFlash"></div>
      <div class="mode-badge" id="modeBadge">READY</div>
      <div class="triggered-label" id="triggeredLabel"></div>
      <div class="conf-wrap"><div class="conf-bar" id="confBar"></div></div>
    </div>

    <aside class="sidebar">
      <div class="sidebar-tabs">
        <div class="sidebar-tab active" data-tab="gestures">Gestures</div>
        <div class="sidebar-tab" data-tab="record">Record</div>
        <div class="sidebar-tab" data-tab="log">Log</div>
      </div>

      <div class="sidebar-panel active" id="panel-gestures">
        <div class="section-label">Active Gestures</div>
        <div class="gesture-tiles" id="gestureTiles"></div>
        <button class="btn-primary" id="btnTrainGo" disabled>▶ Train & Start</button>
        <button class="btn-secondary" id="btnAddMore">+ Add Another Gesture</button>
        <button class="btn-danger" id="btnReset">Reset Everything</button>
      </div>

      <div class="sidebar-panel" id="panel-record">
        <div class="section-label">Neutral Baseline</div>
        <div class="smooth-info">Sit relaxed, no gesture. This teaches the system your resting position.</div>
        <button class="btn-secondary" id="btnNeutral">⬤ Record Neutral</button>
        <div class="rec-card" id="neutralRecCard">
          <div class="rec-card-label">Progress</div>
          <div class="rec-bar-wrap" style="background:var(--surface2);border-radius:100px;height:8px;overflow:hidden;margin-bottom:6px;">
            <div class="rec-bar" id="neutralBar" style="height:100%;width:0%;background:var(--accent);border-radius:100px;transition:width 0.2s;"></div>
          </div>

function buildStepDots(step) {
  const dots = document.getElementById("wizardSteps");
  dots.innerHTML = WIZARD_STEPS.map((_, i) => `
    <div class="wizard-step-dot ${i < step ? "done" : i === step ? "active" : ""}"></div>

}

function renderWizard() {
  const step = WIZARD_STEPS[wizardStep];
  buildStepDots(wizardStep);

  const body = document.getElementById("wizardBody");
  const title = document.getElementById("wizardTitle");

  if (step === "body_parts") {

      <div class="neutral-diagram">
        <div class="neutral-diagram-icon">😌</div>

  else if (step === "record") {

        <div class="spacer"></div>
        <button class="btn-wizard-rec ${isWizardRecording ? 'recording' : ''}" id="recBtn" ${sessionDone && !isWizardRecording ? 'style="display:none"' : ''}>
          ${isWizardRecording ? '■ Stop' : '⬤ Record Session ' + (wizardSessionIdx + 1)}
        </button>
        ${allSessionsDone ? `<button class="btn-wizard-next" id="recNext">${isLast ? 'Finish →' : 'Next Gesture →'}</button>` : ''}

function launchApp() {

}

function refreshGestureTiles() {
  gestureTiles.innerHTML = Object.entries(gestureRegistry).map(([id, g]) => `
    <div class="gesture-tile" id="tile_${id}">
      <div class="gesture-tile-icon">${g.icon}</div>

  `).join("");

  updateTrainButton();

// ══════════════════════════════════════════════
// WEBSOCKET
// ══════════════════════════════════════════════

function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  socket = new WebSocket(`${proto}://${location.host}/ws`);
  socket.binaryType = "blob";

  socket.onopen = () => {
    wsDot.classList.add("connected");
    wsLabel.textContent = "CONNECTED";
    log("Connected", "ok");
    sendCmd({ command: "get_status" });
  };
  socket.onclose = () => {
    wsDot.classList.remove("connected");
    wsLabel.textContent = "DISCONNECTED";
    setTimeout(connectWS, 2000);
  };
  socket.onerror = () => log("WebSocket error", "warn");
  socket.onmessage = (evt) => {
    if (evt.data instanceof Blob) { playBlob(evt.data); return; }
    try { handleMsg(JSON.parse(evt.data)); } catch {}
  };
}

function sendCmd(obj) {
  if (socket?.readyState === WebSocket.OPEN) socket.send(JSON.stringify(obj));
}
function sendFrame(face, hands) {
  if (socket?.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ face, hands }));
}

// ══════════════════════════════════════════════
// MESSAGE HANDLER
// ══════════════════════════════════════════════

function handleMsg(msg) {
  if (msg.status === "mode_set") {
    mode = msg.mode;
    updateModeBadge();
  }

  if (msg.status === "collecting") {
    if (msg.label === "neutral") {
      wizardNeutralFrames = msg.count;
      neutralFrames = msg.count;
      updateNeutralUI();
      if (wizardStep === 2) renderWizard();
    } else {
      const sidx = msg.session_idx;
      if (!gestureSessionData[msg.label]) gestureSessionData[msg.label] = Array(SESSIONS_REQUIRED).fill(0);
      gestureSessionData[msg.label][sidx] = msg.count;
      if (wizardStep === 3) renderWizard();
    }
  }

  if (msg.status === "session_complete") {
    const { gesture_id, session_idx, sessions } = msg;
    gestureSessionData[gesture_id] = sessions;
    if (gestureRegistry[gesture_id]) gestureRegistry[gesture_id].sessions = sessions;
    activeGestureId = null; activeSessionIdx = null;
    isWizardRecording = false;
    mode = "NEUTRAL"; updateModeBadge();
    log(`Session ${session_idx + 1} done for ${gesture_id}`, "ok");

    // Auto-advance wizard session
    if (wizardStep === 3) {
      const completedSessions = sessions.filter(s => s >= FRAMES_PER_SESSION).length;
      if (completedSessions < SESSIONS_REQUIRED) {
        wizardSessionIdx = completedSessions; // jump to next empty slot
      }
      renderWizard();
    }
  }

  if (msg.status === "trained") {
    mode = "INFERENCE"; isInference = true;
    updateModeBadge();
    log(`Model ready — ${Object.keys(gestureRegistry).length} gestures`, "ok");
  }
  if (msg.status === "train_failed") log(`Training failed: ${msg.reason}`, "warn");

  if (msg.status === "prediction") {
    queueFill = msg.queue_fill;
    const smoothed = smoothPredict(msg.label);
    updatePredictionUI(smoothed);
  }

  if (msg.status === "triggered") {
    const reg = gestureRegistry[msg.gesture] || {};
    log(`🔊 ${reg.phrase || msg.gesture}`, "trigger");
    flash(reg.phrase || msg.gesture);
  }

  if (msg.status === "ok" && msg.mode) {
    mode = msg.mode;
    neutralFrames = msg.neutral_frames || 0;
    updateNeutralUI(); updateModeBadge();
    if (msg.phrases) {
      Object.entries(msg.phrases).forEach(([id, phrase]) => {
        if (!gestureRegistry[id]) gestureRegistry[id] = { name: id, phrase, icon: "👋", sessions: [] };
        else gestureRegistry[id].phrase = phrase;
      });
    }
  }
  if (msg.error) log(msg.error, "warn");
}

// ── Smooth prediction ───────────────────────────────────────────────────
function smoothPredict(raw) {
  smoothQueue.push(raw);
  if (smoothQueue.length > SMOOTH_WINDOW) smoothQueue.shift();
  const counts = {};
  for (const p of smoothQueue) counts[p] = (counts[p] || 0) + 1;
  return Object.entries(counts).sort((a, b) => b[1] - a[1])[0][0];
}

// ══════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════

function updateModeBadge() {
  modeBadge.className = "mode-badge";
  if (mode === "NEUTRAL") { modeBadge.textContent = "READY"; }
  else if (mode.startsWith("TRAIN")) { modeBadge.classList.add("recording"); modeBadge.textContent = "RECORDING…"; }
  else if (mode === "INFERENCE") { modeBadge.classList.add("inference"); modeBadge.textContent = "LISTENING"; }
}

function updateNeutralUI() {
  const pct = Math.min(neutralFrames / FRAMES_PER_SESSION * 100, 100);
  neutralBar.style.width = pct + "%";
  neutralCount.textContent = `${neutralFrames} / ${FRAMES_PER_SESSION} frames`;
}

function updatePredictionUI(label) {
  const isNeutral = label === "neutral";
  const fill = queueFill / QUEUE_LEN;
  confBar.style.width = isNeutral ? "0%" : (fill * 100) + "%";

  // Highlight active tile
  document.querySelectorAll(".gesture-tile").forEach(t => t.classList.remove("active-pred"));
  document.querySelectorAll(".gesture-tile-status").forEach(s => s.textContent = "—");
  if (!isNeutral) {
    const tile = document.getElementById("tile_" + label);
    const status = document.getElementById("tileStatus_" + label);
    if (tile) tile.classList.add("active-pred");
    if (status) status.textContent = `${Math.round(fill * 100)}%`;
  }
}

function flash(phrase) {
  triggerFlash.classList.add("fire");
  setTimeout(() => triggerFlash.classList.remove("fire"), 400);
  triggeredLbl.textContent = `🔊 "${phrase}"`;
  triggeredLbl.classList.add("show");
  clearTimeout(triggeredLbl._t);
  triggeredLbl._t = setTimeout(() => triggeredLbl.classList.remove("show"), 3000);
}

async function initMediaPipe() {
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  [faceLandmarker, handLandmarker] = await Promise.all([
    FaceLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO", numFaces: 1,
    }),
    HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU",
      },
      runningMode: "VIDEO", numHands: 2,
    }),
  ]);
  log("Camera & tracking ready", "ok");
}

async function startWebcam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "user" },
    });
    video.srcObject = stream;
    await new Promise(r => (video.onloadedmetadata = r));
    await video.play();
    log("Camera on", "ok");
  } catch (e) { log("Camera error: " + e.message, "warn"); }
}

function filterFace(raw) {
  const out = {};
  for (const [key, idx] of Object.entries(FACE_IDX)) {
    if (!raw[idx]) return null;
    out[key] = [raw[idx].x, raw[idx].y];
  }
  return out;
}
function filterHand(raw, handedness) {
  const out = { handedness };
  for (const [key, idx] of Object.entries(HAND_IDX)) {
    if (!raw[idx]) return null;
    out[key] = [raw[idx].x, raw[idx].y];
  }
  return out;
}

function renderLoop() {
  requestAnimationFrame(renderLoop);
  if (!faceLandmarker || !handLandmarker || video.readyState < 2) return;
  if (canvas.width !== video.videoWidth) canvas.width = video.videoWidth;
  if (canvas.height !== video.videoHeight) canvas.height = video.videoHeight;

  ctx.save();
  ctx.scale(-1, 1);
  ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
  ctx.restore();

  if (video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;
  const ts = performance.now();

  const faceResult = faceLandmarker.detectForVideo(video, ts);
  const handResult = handLandmarker.detectForVideo(video, ts);

  const drawUtils = new DrawingUtils(ctx);
  ctx.save();
  ctx.scale(-1, 1); ctx.translate(-canvas.width, 0);

  let filteredFace = null;
  if (faceResult.faceLandmarks?.length) {
    const raw = faceResult.faceLandmarks[0];
    filteredFace = filterFace(raw);
    drawUtils.drawConnectors(raw, FaceLandmarker.FACE_LANDMARKS_TESSELATION,
      { color: "rgba(45,106,79,0.08)", lineWidth: 0.5 });
    const keyPts = Object.values(FACE_IDX).map(i => raw[i]);
    drawUtils.drawLandmarks(keyPts, { color: "#6fd4a0", radius: 3 });
  }

  const filteredHands = [];
  const handCount = handResult.landmarks?.length || 0;
  for (let h = 0; h < handCount; h++) {
    const raw = handResult.landmarks[h];
    const handedness = handResult.handedness[h]?.[0]?.displayName || "Right";
    const color = handedness === "Left" ? "#e07a5f" : "#3d6fa8";
    const conn  = handedness === "Left" ? "rgba(224,122,95,0.3)" : "rgba(61,111,168,0.3)";
    drawUtils.drawConnectors(raw, HandLandmarker.HAND_CONNECTIONS, { color: conn, lineWidth: 2 });
    drawUtils.drawLandmarks(raw, { color, radius: 4, lineWidth: 1 });
    const filtered = filterHand(raw, handedness);
    if (filtered) filteredHands.push(filtered);
  }
  ctx.restore();

  if (filteredFace || filteredHands.length > 0) sendFrame(filteredFace, filteredHands);
}

function addCustomRecCard(id) {
  const reg = gestureRegistry[id];
  const list = document.getElementById("customRecList");
  const card = document.createElement("div");
  card.className = "rec-card"; card.id = "crec_" + id;

  const updateCard = () => {
    const sessions = gestureSessionData[id] || Array(SESSIONS_REQUIRED).fill(0);
    const sidx = sessions.findIndex(s => s < FRAMES_PER_SESSION);
    const currentSidx = sidx === -1 ? SESSIONS_REQUIRED - 1 : sidx;
    const currentCount = sessions[currentSidx] || 0;
    const pct = Math.min(currentCount / FRAMES_PER_SESSION * 100, 100);
    const done = currentCount >= FRAMES_PER_SESSION;
    const recording = mode === "TRAIN_GESTURE" && activeGestureId === id;

    card.innerHTML = `
      <div class="rec-card-label">${reg.icon} ${reg.name} — "${reg.phrase}"</div>
      <div class="rec-progress">
        ${Array.from({length: SESSIONS_REQUIRED}, (_, i) => `
          <div class="rec-session-row">
            <div class="rec-session-num">${i+1}</div>
            <div class="rec-session-track">
              <div class="rec-session-fill ${sessions[i] >= FRAMES_PER_SESSION ? 'done' : ''}" style="width:${Math.min(sessions[i]/FRAMES_PER_SESSION*100,100)}%"></div>
            </div>
            <button class="rec-session-btn ${recording && activeSessionIdx===i ? 'recording' : sessions[i]>=FRAMES_PER_SESSION ? 'done' : ''}" data-sidx="${i}">
              ${recording && activeSessionIdx===i ? '■ stop' : sessions[i]>=FRAMES_PER_SESSION ? '✓ redo' : '⬤ rec'}
            </button>
          </div>
        `).join("")}
      </div>
    `;
    card.querySelectorAll(".rec-session-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const sidx = parseInt(btn.dataset.sidx);
        const isRec = mode === "TRAIN_GESTURE" && activeGestureId === id && activeSessionIdx === sidx;
        if (isRec) {
          sendCmd({ command: "set_mode", mode: "NEUTRAL" });
          activeGestureId = null; activeSessionIdx = null;
        } else {
          if (mode === "TRAIN_GESTURE") sendCmd({ command: "set_mode", mode: "NEUTRAL" });
          activeGestureId = id; activeSessionIdx = sidx;
          gestureSessionData[id][sidx] = 0;
          sendCmd({ command: "clear_session", gesture_id: id, session_idx: sidx });
          sendCmd({ command: "set_mode", mode: "TRAIN_GESTURE", gesture_id: id, session_idx: sidx });
        }
        updateCard();
      });
    });
  };
  updateCard();
  list.appendChild(card);

  // Re-render card on messages
  const orig = handleMsg;
  // Store reference so session updates re-render this card
  card._update = updateCard;
}
